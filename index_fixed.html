document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: #34d399;\n      --col-adv: #a78bfa;\n\n      --radius: 20px;\n      --radius-sm: 12px;\n      --radius-xs: 8px;\n\n      font-family: 'DM Sans', sans-serif;\n      color-scheme: dark;\n    }\n\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n\n    body {\n      background: var(--bg);\n      color: var(--text);\n      min-height: 100vh;\n      overflow-x: hidden;\n    }\n\n    /* \u2500\u2500 Animated background \u2500\u2500 */\n    body::before {\n      content: '';\n      position: fixed;\n      inset: 0;\n      background:\n        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.13) 0%, transparent 60%),\n        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,182,212,0.09) 0%, transparent 55%),\n        radial-gradient(ellipse 40% 60% at 60% 40%, rgba(99,102,241,0.05) 0%, transparent 50%);\n      pointer-events: none;\n      z-index: 0;\n    }\n\n    /* \u2500\u2500 Noise grain overlay (canvas-injected) \u2500\u2500 */\n    #grain-canvas {\n      position: fixed;\n      inset: 0;\n      pointer-events: none;\n      z-index: 0;\n      opacity: 0.04;\n    }\n\n    /* \u2500\u2500 Hero \u2500\u2500 */\n    .hero {\n      position: relative;\n      z-index: 1;\n      padding: 0;\n      overflow: hidden;\n    }\n\n    .hero-mesh {\n      position: absolute;\n      inset: 0;\n      background:\n        linear-gradient(135deg, #060e1f 0%, #0a1628 40%, #0d1f3c 100%);\n      overflow: hidden;\n    }\n\n    .hero-mesh::before {\n      content: '';\n      position: absolute;\n      width: 700px; height: 700px;\n      top: -200px; left: -100px;\n      background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 65%);\n      animation: pulse 8s ease-in-out infinite;\n    }\n\n    .hero-mesh::after {\n      content: '';\n      position: absolute;\n      width: 500px; height: 500px;\n      bottom: -200px; right: 5%;\n      background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 65%);\n      animation: pulse 10s ease-in-out infinite reverse;\n    }\n\n    @keyframes pulse {\n      0%, 100% { transform: scale(1); opacity: 1; }\n      50% { transform: scale(1.15); opacity: 0.7; }\n    }\n\n    /* Animated grid lines */\n    .hero-grid {\n      position: absolute;\n      inset: 0;\n      background-image:\n        linear-gradient(rgba(59,130,246,0.06) 1px, transparent 1px),\n        linear-gradient(90deg, rgba(59,130,246,0.06) 1px, transparent 1px);\n      background-size: 60px 60px;\n      mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);\n    }\n\n    .hero-inner {\n      position: relative;\n      z-index: 2;\n      max-width: 1300px;\n      margin: 0 auto;\n      padding: 40px 28px 36px;\n    }\n\n    .badge {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      background: rgba(59,130,246,0.15);\n      border: 1px solid rgba(59,130,246,0.3);\n      border-radius: 100px;\n      padding: 4px 14px 4px 10px;\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: .08em;\n      margin-bottom: 16px;\n      color: #93c5fd;\n      text-transform: uppercase;\n    }\n\n    .badge::before {\n      content: '';\n      width: 6px; height: 6px;\n      border-radius: 50%;\n      background: var(--accent2);\n      box-shadow: 0 0 6px var(--accent2);\n      animation: blink 2s ease-in-out infinite;\n    }\n\n    @keyframes blink {\n      0%, 100% { opacity: 1; }\n      50% { opacity: 0.3; }\n    }\n\n    .hero h1 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: clamp(24px, 3vw, 38px);\n      font-weight: 700;\n      letter-spacing: -.5px;\n      line-height: 1.15;\n      color: #f0f6ff;\n      margin-bottom: 12px;\n    }\n\n    .hero h1 span {\n      background: linear-gradient(135deg, #60a5fa, #06b6d4);\n      -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent;\n      background-clip: text;\n    }\n\n    .hero p {\n      font-size: 14px;\n      color: rgba(180,200,230,0.7);\n      line-height: 1.65;\n      max-width: 680px;\n    }\n\n    /* \u2500\u2500 Hero bottom bar \u2500\u2500 */\n    .hero-bar {\n      position: relative;\n      z-index: 2;\n      border-top: 1px solid rgba(59,130,246,0.12);\n      background: rgba(6,10,20,0.5);\n      backdrop-filter: blur(12px);\n      padding: 0 28px;\n    }\n\n    .hero-bar-inner {\n      max-width: 1300px;\n      margin: 0 auto;\n      display: flex;\n      align-items: center;\n      gap: 32px;\n      height: 48px;\n      overflow-x: auto;\n      scrollbar-width: none;\n    }\n\n    .hero-bar-inner::-webkit-scrollbar { display: none; }\n\n    .hero-stat {\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      white-space: nowrap;\n      flex-shrink: 0;\n    }\n\n    .hero-stat-label {\n      font-size: 11px;\n      font-weight: 600;\n      color: var(--text-muted);\n      text-transform: uppercase;\n      letter-spacing: .07em;\n    }\n\n    .hero-stat-value {\n      font-family: 'DM Mono', monospace;\n      font-size: 13px;\n      font-weight: 500;\n      color: var(--text);\n    }\n\n    .hero-stat-sep {\n      width: 1px;\n      height: 20px;\n      background: rgba(59,130,246,0.15);\n    }\n\n    /* \u2500\u2500 Layout \u2500\u2500 */\n    .wrap {\n      position: relative;\n      z-index: 1;\n      max-width: 1300px;\n      margin: 0 auto;\n      padding: 24px 16px 60px;\n    }\n\n    .layout {\n      display: grid;\n      grid-template-columns: 370px 1fr;\n      gap: 20px;\n      align-items: start;\n    }\n\n    /* \u2500\u2500 Glass Cards \u2500\u2500 */\n    .card {\n      background: var(--card);\n      border: 1px solid var(--card-border);\n      border-radius: var(--radius);\n      box-shadow:\n        0 0 0 1px rgba(0,0,0,0.3),\n        0 8px 32px rgba(0,0,0,0.4),\n        0 1px 0 rgba(255,255,255,0.03) inset;\n      padding: 24px;\n      backdrop-filter: blur(20px);\n      transition: border-color .3s;\n    }\n\n    .card:hover {\n      border-color: var(--card-border-hover);\n    }\n\n    .card-title {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 15px;\n      font-weight: 700;\n      margin-bottom: 4px;\n      color: var(--text);\n      letter-spacing: -.1px;\n    }\n\n    .card-sub {\n      color: var(--text-muted);\n      font-size: 12.5px;\n      line-height: 1.5;\n    }\n\n    /* \u2500\u2500 Section label \u2500\u2500 */\n    .section-label {\n      font-size: 10.5px;\n      font-weight: 700;\n      text-transform: uppercase;\n      letter-spacing: .1em;\n      color: var(--text-dim);\n      margin: 20px 0 10px;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n\n    .section-label::after {\n      content: '';\n      flex: 1;\n      height: 1px;\n      background: var(--line);\n    }\n\n    /* \u2500\u2500 Inputs \u2500\u2500 */\n    .input-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 10px;\n    }\n\n    .field label {\n      display: block;\n      font-size: 10.5px;\n      font-weight: 700;\n      color: var(--text-muted);\n      letter-spacing: .06em;\n      margin-bottom: 6px;\n      text-transform: uppercase;\n    }\n\n    .field-help {\n      margin-top: 6px;\n      color: var(--text-dim);\n      font-size: 11px;\n      line-height: 1.45;\n    }\n\n    .intro-block {\n      margin-top: 14px;\n      border: 1px solid rgba(59,130,246,0.12);\n      border-radius: var(--radius-sm);\n      background: rgba(59,130,246,0.05);\n      padding: 14px 16px;\n    }\n\n    .intro-block h4, .guide-block h4 {\n      font-size: 11.5px;\n      font-weight: 700;\n      margin-bottom: 8px;\n      color: #93c5fd;\n      text-transform: uppercase;\n      letter-spacing: .07em;\n    }\n\n    .intro-block p, .guide-block p {\n      color: var(--text-muted);\n      font-size: 12px;\n      line-height: 1.65;\n      margin-bottom: 8px;\n    }\n\n    .guide-block {\n      margin: 0 22px 16px;\n      border: 1px solid rgba(59,130,246,0.1);\n      border-radius: var(--radius-sm);\n      background: rgba(59,130,246,0.04);\n      padding: 14px 16px;\n    }\n\n    .guide-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 10px 16px;\n    }\n\n    .guide-item {\n      color: var(--text-muted);\n      font-size: 11.5px;\n      line-height: 1.6;\n    }\n\n    .guide-item strong { color: var(--text); }\n\n    .field input {\n      width: 100%;\n      padding: 10px 13px;\n      border: 1.5px solid var(--input-border);\n      border-radius: var(--radius-xs);\n      font-size: 14px;\n      font-family: 'DM Mono', monospace;\n      font-weight: 500;\n      background: var(--input-bg);\n      color: var(--text);\n      outline: none;\n      transition: border-color .2s, box-shadow .2s, background .2s;\n      -moz-appearance: textfield;\n    }\n\n    .field input::-webkit-inner-spin-button,\n    .field input::-webkit-outer-spin-button { -webkit-appearance: none; }\n\n    .field input:focus {\n      border-color: var(--accent);\n      box-shadow: 0 0 0 3px var(--accent-glow), 0 0 12px var(--accent-soft);\n      background: rgba(8,13,24,0.95);\n    }\n\n    .field input:hover:not(:focus) {\n      border-color: rgba(59,130,246,0.35);\n    }\n\n    /* \u2500\u2500 Advanced accordion \u2500\u2500 */\n    details {\n      margin-top: 16px;\n      border: 1px solid rgba(59,130,246,0.15);\n      border-radius: var(--radius-sm);\n      background: rgba(59,130,246,0.03);\n      overflow: hidden;\n    }\n\n    summary {\n      cursor: pointer;\n      padding: 12px 16px;\n      font-size: 12.5px;\n      font-weight: 700;\n      color: #93c5fd;\n      list-style: none;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      transition: background .2s;\n      user-select: none;\n    }\n\n    summary:hover { background: rgba(59,130,246,0.06); }\n    summary::-webkit-details-marker { display: none; }\n\n    .summary-arrow {\n      width: 16px; height: 16px;\n      border-radius: 50%;\n      background: rgba(59,130,246,0.15);\n      display: flex; align-items: center; justify-content: center;\n      font-size: 8px;\n      transition: transform .25s, background .2s;\n      flex-shrink: 0;\n    }\n\n    details[open] .summary-arrow { transform: rotate(90deg); background: rgba(59,130,246,0.3); }\n\n    .adv-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 10px;\n      padding: 0 16px 16px;\n    }\n\n    /* \u2500\u2500 Toolbar \u2500\u2500 */\n    .toolbar {\n      display: flex;\n      gap: 10px;\n      margin-top: 18px;\n      flex-wrap: wrap;\n    }\n\n    button {\n      border: none;\n      border-radius: var(--radius-xs);\n      padding: 11px 20px;\n      font-size: 13px;\n      font-weight: 700;\n      font-family: 'DM Sans', sans-serif;\n      cursor: pointer;\n      transition: all .2s;\n      letter-spacing: .01em;\n    }\n\n    .btn-primary {\n      background: linear-gradient(135deg, #2563eb, #1d4ed8);\n      color: #fff;\n      box-shadow: 0 4px 15px rgba(37,99,235,0.35), 0 1px 0 rgba(255,255,255,0.1) inset;\n    }\n\n    .btn-primary:hover {\n      background: linear-gradient(135deg, #3b82f6, #2563eb);\n      box-shadow: 0 6px 20px rgba(37,99,235,0.5), 0 1px 0 rgba(255,255,255,0.1) inset;\n      transform: translateY(-1px);\n    }\n\n    .btn-primary:active { transform: translateY(0); }\n\n    .btn-secondary {\n      background: rgba(59,130,246,0.08);\n      color: #93c5fd;\n      border: 1px solid rgba(59,130,246,0.2);\n    }\n\n    .btn-secondary:hover {\n      background: rgba(59,130,246,0.15);\n      border-color: rgba(59,130,246,0.4);\n    }\n\n    /* \u2500\u2500 How to read \u2500\u2500 */\n    .how-block {\n      margin-top: 16px;\n      border: 1px solid rgba(59,130,246,0.1);\n      border-radius: var(--radius-sm);\n      background: rgba(59,130,246,0.04);\n      padding: 14px 16px;\n    }\n\n    .how-block h4 {\n      font-size: 11.5px;\n      font-weight: 700;\n      margin-bottom: 8px;\n      color: #93c5fd;\n      text-transform: uppercase;\n      letter-spacing: .07em;\n    }\n\n    .how-block ul {\n      padding-left: 0;\n      list-style: none;\n      color: var(--text-muted);\n      font-size: 12px;\n      line-height: 1.65;\n    }\n\n    .how-block li {\n      display: flex;\n      gap: 8px;\n      padding: 3px 0;\n    }\n\n    .how-block li::before {\n      content: '\u2192';\n      color: var(--accent2);\n      flex-shrink: 0;\n      font-size: 10px;\n      margin-top: 2px;\n    }\n\n    .how-block strong { color: var(--text); font-weight: 600; }\n\n    /* \u2500\u2500 Fix notice \u2500\u2500 */\n    .fix-notice {\n      margin-top: 14px;\n      background: rgba(251,191,36,0.06);\n      border: 1px solid rgba(251,191,36,0.2);\n      border-radius: var(--radius-sm);\n      padding: 12px 14px;\n      font-size: 11.5px;\n      color: rgba(251,191,36,0.75);\n      line-height: 1.6;\n    }\n\n    .fix-notice strong { color: #fbbf24; }\n\n    /* \u2500\u2500 Metric cards \u2500\u2500 */\n    .metrics {\n      display: grid;\n      grid-template-columns: repeat(4, 1fr);\n      gap: 14px;\n      margin-bottom: 18px;\n    }\n\n    .metric {\n      background: var(--card);\n      border: 1px solid var(--card-border);\n      border-radius: var(--radius);\n      padding: 20px 18px;\n      box-shadow: 0 4px 20px rgba(0,0,0,0.3);\n      backdrop-filter: blur(20px);\n      position: relative;\n      overflow: hidden;\n      transition: transform .2s, border-color .3s, box-shadow .3s;\n      animation: fadeUp .4s both;\n    }\n\n    .metric:nth-child(1) { animation-delay: .05s; }\n    .metric:nth-child(2) { animation-delay: .1s; }\n    .metric:nth-child(3) { animation-delay: .15s; }\n    .metric:nth-child(4) { animation-delay: .2s; }\n\n    @keyframes fadeUp {\n      from { opacity: 0; transform: translateY(12px); }\n      to   { opacity: 1; transform: translateY(0); }\n    }\n\n    .metric::before {\n      content: '';\n      position: absolute;\n      top: 0; left: 0; right: 0;\n      height: 2px;\n      background: linear-gradient(90deg, var(--accent), var(--accent2));\n      opacity: 0;\n      transition: opacity .3s;\n    }\n\n    .metric:hover {\n      transform: translateY(-2px);\n      border-color: var(--card-border-hover);\n      box-shadow: 0 8px 30px rgba(0,0,0,0.4), 0 0 20px var(--accent-soft);\n    }\n\n    .metric:hover::before { opacity: 1; }\n\n    .metric .k {\n      font-size: 10px;\n      font-weight: 700;\n      color: var(--text-muted);\n      text-transform: uppercase;\n      letter-spacing: .1em;\n      margin-bottom: 10px;\n    }\n\n    .metric .v {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 28px;\n      font-weight: 700;\n      line-height: 1.1;\n      letter-spacing: -.5px;\n      color: var(--text);\n      transition: color .3s;\n    }\n\n    .metric .hint {\n      font-size: 11px;\n      color: var(--text-dim);\n      margin-top: 6px;\n      line-height: 1.4;\n    }\n\n    .good { color: var(--good) !important; }\n    .bad  { color: var(--bad)  !important; }\n\n    /* \u2500\u2500 Table card \u2500\u2500 */\n    .table-card { padding: 0; overflow: hidden; }\n\n    .table-head {\n      padding: 20px 22px 16px;\n      border-bottom: 1px solid var(--line);\n      display: flex;\n      align-items: flex-start;\n      justify-content: space-between;\n      gap: 16px;\n    }\n\n    .table-wrap {\n      width: 100%;\n      overflow-x: auto;\n      scrollbar-width: thin;\n      scrollbar-color: rgba(59,130,246,0.2) transparent;\n    }\n\n    .table-wrap::-webkit-scrollbar { height: 6px; }\n    .table-wrap::-webkit-scrollbar-thumb {\n      background: rgba(59,130,246,0.25);\n      border-radius: 3px;\n    }\n\n    table {\n      width: 100%;\n      min-width: 1380px;\n      border-collapse: separate;\n      border-spacing: 0;\n      font-size: 13px;\n    }\n\n    th, td {\n      padding: 11px 12px;\n      border-bottom: 1px solid rgba(59,130,246,0.07);\n      text-align: right;\n      white-space: nowrap;\n      vertical-align: middle;\n    }\n\n    th {\n      position: sticky;\n      top: 0;\n      z-index: 2;\n      background: rgba(8,13,24,0.97);\n      color: var(--text-muted);\n      font-size: 10px;\n      font-weight: 700;\n      text-transform: uppercase;\n      letter-spacing: .07em;\n      border-bottom: 1px solid rgba(59,130,246,0.15);\n      backdrop-filter: blur(10px);\n    }\n\n    th:first-child, td:first-child {\n      text-align: left;\n      position: sticky;\n      left: 0;\n      z-index: 1;\n      background: var(--bg2);\n    }\n\n    thead th:first-child { z-index: 3; background: rgba(8,13,24,0.97); }\n\n    tbody tr {\n      transition: background .15s;\n    }\n\n    tbody td:first-child {\n      background: var(--bg2);\n      font-family: 'Space Grotesk', sans-serif;\n      font-weight: 700;\n      font-size: 14px;\n      color: var(--text);\n      transition: background .15s;\n    }\n\n    tbody tr:hover td {\n      background: rgba(59,130,246,0.06);\n    }\n\n    tbody tr:hover td:first-child {\n      background: rgba(59,130,246,0.08);\n    }\n\n    /* year cell styling */\n    .year-cell {\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n\n    .year-dot {\n      width: 6px; height: 6px;\n      border-radius: 50%;\n      background: var(--accent);\n      flex-shrink: 0;\n    }\n\n    /* column color coding */\n    .col-cost { color: var(--col-cost); font-family: 'DM Mono', monospace; font-size: 12.5px; }\n    .col-gain { color: var(--col-gain); font-family: 'DM Mono', monospace; font-size: 12.5px; }\n    .col-adv  { color: var(--col-adv);  font-family: 'DM Mono', monospace; font-size: 12.5px; }\n    .col-neutral { font-family: 'DM Mono', monospace; font-size: 12.5px; color: var(--text-muted); }\n\n    .net-positive {\n      background: var(--good-bg) !important;\n      color: var(--good) !important;\n      font-weight: 700;\n      font-family: 'DM Mono', monospace;\n      font-size: 12.5px;\n    }\n\n    .net-negative {\n      background: var(--bad-bg) !important;\n      color: var(--bad) !important;\n      font-weight: 700;\n      font-family: 'DM Mono', monospace;\n      font-size: 12.5px;\n    }\n\n    /* \u2500\u2500 Info tooltip \u2500\u2500 */\n    .info {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      width: 14px; height: 14px;\n      margin-left: 4px;\n      border-radius: 50%;\n      background: rgba(59,130,246,0.15);\n      color: #93c5fd;\n      font-size: 8px;\n      font-weight: 800;\n      cursor: help;\n      vertical-align: middle;\n      font-style: normal;\n      transition: background .2s;\n      border: 1px solid rgba(59,130,246,0.2);\n    }\n\n    .info:hover { background: rgba(59,130,246,0.3); }\n\n    /* \u2500\u2500 Column header groups \u2500\u2500 */\n    .col-group-cost { color: var(--col-cost) !important; }\n    .col-group-gain { color: var(--col-gain) !important; }\n    .col-group-adv  { color: var(--col-adv)  !important; }\n\n    /* \u2500\u2500 Legend \u2500\u2500 */\n    .legend {\n      padding: 14px 22px;\n      border-top: 1px solid var(--line);\n      background: rgba(0,0,0,0.2);\n      color: var(--text-dim);\n      font-size: 11.5px;\n      line-height: 1.6;\n    }\n\n    /* \u2500\u2500 Legend color dots \u2500\u2500 */\n    .legend-dots {\n      display: flex;\n      gap: 20px;\n      margin-bottom: 8px;\n      flex-wrap: wrap;\n    }\n\n    .legend-dot {\n      display: flex;\n      align-items: center;\n      gap: 6px;\n      font-size: 11px;\n      font-weight: 600;\n      color: var(--text-muted);\n    }\n\n    .legend-dot span {\n      width: 8px; height: 8px;\n      border-radius: 2px;\n      flex-shrink: 0;\n    }\n\n    /* \u2500\u2500 Responsive \u2500\u2500 */\n    @media(max-width:1100px) {\n      .layout { grid-template-columns: 1fr }\n      .metrics { grid-template-columns: 1fr 1fr }\n    }\n\n    @media(max-width:650px) {\n      .input-grid, .adv-grid, .metrics { grid-template-columns: 1fr }\n      .hero h1 { font-size: 22px }\n      .wrap { padding: 14px 10px 28px }\n      .hero-inner { padding: 28px 16px 24px }\n    }\n\n    /* \u2500\u2500 Tweaks panel \u2500\u2500 */\n    #tweaks-panel {\n      display: none;\n      position: fixed;\n      bottom: 24px; right: 24px;\n      z-index: 1000;\n      background: rgba(13,21,37,0.97);\n      border: 1px solid rgba(59,130,246,0.25);\n      border-radius: var(--radius);\n      padding: 20px;\n      width: 260px;\n      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.5);\n      backdrop-filter: blur(20px);\n    }\n\n    #tweaks-panel h3 {\n      font-family: 'Space Grotesk', sans-serif;\n      font-size: 13px;\n      font-weight: 700;\n      color: var(--text);\n      margin-bottom: 16px;\n      display: flex;\n      align-items: center;\n      gap: 6px;\n    }\n\n    #tweaks-panel h3::before {\n      content: '\u2699';\n      font-size: 12px;\n      color: var(--accent);\n    }\n\n    .tweak-row {\n      margin-bottom: 14px;\n    }\n\n    .tweak-label {\n      font-size: 10.5px;\n      font-weight: 700;\n      text-transform: uppercase;\n      letter-spacing: .08em;\n      color: var(--text-muted);\n      margin-bottom: 8px;\n    }\n\n    .tweak-swatches {\n      display: flex;\n      gap: 8px;\n      flex-wrap: wrap;\n    }\n\n    .swatch {\n      width: 28px; height: 28px;\n      border-radius: 50%;\n      cursor: pointer;\n      border: 2px solid transparent;\n      transition: transform .2s, border-color .2s;\n    }\n\n    .swatch:hover { transform: scale(1.15); }\n    .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }\n\n    .tweak-toggle {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n    }\n\n    .toggle-btn {\n      width: 40px; height: 22px;\n      border-radius: 100px;\n      background: rgba(59,130,246,0.15);\n      border: 1px solid rgba(59,130,246,0.2);\n      cursor: pointer;\n      position: relative;\n      transition: background .3s;\n    }\n\n    .toggle-btn.on { background: var(--accent); }\n\n    .toggle-btn::after {\n      content: '';\n      position: absolute;\n      width: 16px; height: 16px;\n      border-radius: 50%;\n      background: #fff;\n      top: 2px; left: 2px;\n      transition: transform .25s;\n      box-shadow: 0 1px 4px rgba(0,0,0,0.3);\n    }\n\n    .toggle-btn.on::after { transform: translateX(18px); }\n\n    /* Light theme overrides */\n    body.light-theme {\n      --bg: #f0f4fa;\n      --bg2: #ffffff;\n      --bg3: #f8faff;\n      --card: rgba(255,255,255,0.9);\n      --card-border: rgba(59,130,246,0.15);\n      --card-border-hover: rgba(59,130,246,0.35);\n      --text: #0f1e35;\n      --text-muted: #5a6a85;\n      --text-dim: #94a3b8;\n      --line: rgba(59,130,246,0.1);\n      --header-bg: rgba(240,244,250,0.95);\n      --input-bg: rgba(248,250,255,0.9);\n      --input-border: rgba(59,130,246,0.2);\n      --good-bg: rgba(52,211,153,0.1);\n      --bad-bg: rgba(248,113,113,0.1);\n      color-scheme: light;\n    }\n\n    body.light-theme::before {\n      background:\n        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.07) 0%, transparent 60%),\n        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(6,182,212,0.05) 0%, transparent 55%);\n    }\n\n    body.light-theme .hero-mesh {\n      background: linear-gradient(135deg, #0f2354 0%, #1434a4 40%, #1e4fd8 100%);\n    }\n\n    body.light-theme th {\n      background: rgba(240,244,250,0.97);\n      color: #64748b;\n    }\n\n    body.light-theme thead th:first-child { background: rgba(240,244,250,0.97); }\n    body.light-theme tbody td:first-child { background: #fff; }\n    body.light-theme tbody tr:hover td { background: rgba(59,130,246,0.04); }\n    body.light-theme tbody tr:hover td:first-child { background: rgba(59,130,246,0.06); }\n\n    body.light-theme #tweaks-panel {\n      background: rgba(255,255,255,0.97);\n      border  swap;\n  src: url(\"0c47a845-7519-4062-9a25-82500d729dfe\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Rubik';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5dd075f0-866b-409d-a2c5-4de40dbc6040\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n</style></head>\n<body class=\"light-theme\">\n\n<!-- \u2500\u2500 Hero \u2500\u2500 -->\n<canvas id=\"grain-canvas\" width=\"1104\" height=\"789\"></canvas>\n<script>\n(function(){\n  var c=document.getElementById('grain-canvas');\n  var ctx=c.getContext('2d');\n  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}\n  function draw(){\n    var w=c.width,h=c.height;\n    var img=ctx.createImageData(w,h);\n    var d=img.data;\n    for(var i=0;i<d.length;i+=4){\n      var v=Math.random()*255|0;\n      d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;\n    }\n    ctx.putImageData(img,0,0);\n  }\n  resize();draw();\n  window.addEventListener('resize',function(){resize();draw();});\n})();\n<\/script>\n<div class=\"hero\">\n  <div class=\"hero-mesh\">\n    <div class=\"hero-grid\"></div>\n  </div>\n  <div class=\"hero-inner\">\n    <div class=\"badge\">v2 \u00b7 Formula-Corrected</div>\n    <h1>Home Break-Even &amp;<br><span>Rent-vs-Buy Calculator</span></h1>\n    <p>Accurately models your true cost of ownership. Hover the <em>i</em> icon on each column to see the formula. Basic Net correctly uses interest paid only \u2014 not total P+I \u2014 to avoid double-counting principal paydown.</p>\n  </div>\n  <div class=\"hero-bar\">\n    <div class=\"hero-bar-inner\">\n      <div class=\"hero-stat\">\n        <div class=\"hero-stat-label\">Monthly Payment</div>\n        <div class=\"hero-stat-value\" id=\"heroMonthly\">$3,034</div>\n      </div>\n      <div class=\"hero-stat-sep\"></div>\n      <div class=\"hero-stat\">\n        <div class=\"hero-stat-label\">Basic Break-Even</div>\n        <div class=\"hero-stat-value\" id=\"heroBE1\">&gt;30 yrs</div>\n      </div>\n      <div class=\"hero-stat-sep\"></div>\n      <div class=\"hero-stat\">\n        <div class=\"hero-stat-label\">Advanced Break-Even</div>\n        <div class=\"hero-stat-value\" id=\"heroBE2\">13y 10m</div>\n      </div>\n      <div class=\"hero-stat-sep\"></div>\n      <div class=\"hero-stat\">\n        <div class=\"hero-stat-label\">Adv. Net @ 5 Yrs</div>\n        <div class=\"hero-stat-value\" id=\"heroFive\">\u2212$79,147</div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div class=\"wrap\">\n  <div class=\"layout\">\n\n    <!-- \u2500\u2500 LEFT: Inputs \u2500\u2500 -->\n    <div class=\"card\">\n      <div class=\"card-title\">Calculator Inputs</div>\n      <div class=\"card-sub\">Built for first-time home buyers. Enter your numbers and the calculator estimates when buying starts to make more sense than renting.</div>\n\n      <div class=\"intro-block\">\n        <h4>Start here</h4>\n        <p>This calculator answers one main question: <strong>if you buy this home today, how long do you need to stay before the money works in your favor?</strong></p>\n        <p>It compares what you put into the house, what you may get back when you sell, and in the advanced view, what rent you avoided while owning.</p>\n        <p>Use it as a planning tool, not as tax, lending, or investment advice.</p>\n      </div>\n\n      <div class=\"section-label\">Core Numbers</div>\n      <div class=\"input-grid\">\n        <div class=\"field\"><label>Purchase Price ($)</label><input id=\"purchasePrice\" type=\"number\" value=\"600000\"><div class=\"field-help\">The price you expect to pay for the home.</div></div>\n        <div class=\"field\"><label>Down Payment ($)</label><input id=\"downPayment\" type=\"number\" value=\"120000\"><div class=\"field-help\">The cash you pay up front toward the home price.</div></div>\n        <div class=\"field\"><label>Interest Rate (%)</label><input id=\"interestRate\" type=\"number\" step=\"0.01\" value=\"6.5\"><div class=\"field-help\">Your mortgage rate. A higher rate usually pushes break-even farther out.</div></div>\n        <div class=\"field\"><label>Loan Term (yrs)</label><input id=\"loanTermYears\" type=\"number\" value=\"30\"><div class=\"field-help\">How many years the mortgage runs, such as 15 or 30 years.</div></div>\n        <div class=\"field\"><label>Buy Closing Costs ($)</label><input id=\"initialClosingCosts\" type=\"number\" value=\"15000\"><div class=\"field-help\">One-time buying costs like lender fees, title fees, and prepaid items.</div></div>\n        <div class=\"field\"><label>Appreciation (%/yr)</label><input id=\"annualAppreciation\" type=\"number\" step=\"0.01\" value=\"3\"><div class=\"field-help\">How much you expect the home value to grow each year on average.</div></div>\n      </div>\n\n      <div class=\"section-label\">Ongoing Costs</div>\n      <div class=\"input-grid\">\n        <div class=\"field\"><label>Selling Costs (%)</label><input id=\"sellingCostPercent\" type=\"number\" step=\"0.01\" value=\"7\"><div class=\"field-help\">The percent you may lose when selling, such as agent commissions and other selling fees.</div></div>\n        <div class=\"field\"><label>Property Tax ($/yr)</label><input id=\"annualPropertyTax\" type=\"number\" value=\"12000\"><div class=\"field-help\">Your estimated yearly property taxes.</div></div>\n        <div class=\"field\"><label>Insurance ($/yr)</label><input id=\"annualInsurance\" type=\"number\" value=\"2500\"><div class=\"field-help\">Your yearly homeowners insurance cost.</div></div>\n        <div class=\"field\"><label>Maintenance ($/yr)</label><input id=\"annualMaintenance\" type=\"number\" value=\"6000\"><div class=\"field-help\">Repairs and upkeep. For many first-time buyers, this is easy to underestimate.</div></div>\n        <div class=\"field\"><label>HOA ($/mo)</label><input id=\"monthlyHOA\" type=\"number\" value=\"0\"><div class=\"field-help\">Monthly HOA dues, if the neighborhood or community has them.</div></div>\n        <div class=\"field\"><label>Years to Display</label><input id=\"maxYears\" type=\"number\" value=\"15\"><div class=\"field-help\">How far out you want the yearly comparison table to go.</div></div>\n      </div>\n\n      <details>\n        <summary>\n          <span class=\"summary-arrow\">\u25b6</span>\n          Advanced settings\n        </summary>\n        <div class=\"adv-grid\">\n          <div class=\"field\"><label>Rent Avoided ($/mo)</label><input id=\"monthlyRentSaved\" type=\"number\" value=\"2500\"><div class=\"field-help\">What you would likely pay in rent each month if you did not buy.</div></div>\n          <div class=\"field\"><label>Rent Increase (%/yr)</label><input id=\"annualRentGrowth\" type=\"number\" step=\"0.01\" value=\"3\"><div class=\"field-help\">How much you expect rent to rise each year.</div></div>\n          <div class=\"field\"><label>Opp. Cost Rate (%/yr)</label><input id=\"opportunityCostRate\" type=\"number\" step=\"0.01\" value=\"6\"><div class=\"field-help\">Estimated return that your upfront cash could have earned elsewhere.</div></div>\n          <div class=\"field\"><label>Annual Tax Benefit ($)</label><input id=\"annualTaxBenefit\" type=\"number\" value=\"0\"><div class=\"field-help\">Estimated yearly tax savings from owning, if any. Keep this at 0 if you are unsure.</div></div>\n        </div>\n      </details>\n\n      <div class=\"toolbar\">\n        <button id=\"calcBtn\" class=\"btn-primary\" type=\"button\">\u21bb Recalculate</button>\n        <button id=\"resetBtn\" class=\"btn-secondary\" type=\"button\">Reset defaults</button>\n      </div>\n\n      <div class=\"how-block\">\n        <h4>How to read results</h4>\n        <ul>\n          <li><strong>Monthly Payment</strong> shows principal and interest only. Taxes, insurance, maintenance, and HOA are tracked separately in the table.</li>\n          <li><strong>Basic Net</strong> focuses only on the house itself: cash back from a sale minus your upfront cash, interest paid, and ownership costs.</li>\n          <li><strong>Advanced Net</strong> starts with Basic Net, then adds rent avoided and tax benefit, and subtracts opportunity cost on your upfront cash.</li>\n          <li><strong>Break-even</strong> is the first point where the chosen net value turns positive. Before that point, you are still financially behind.</li>\n        </ul>\n      </div>\n\n      <div class=\"fix-notice\">\n        <strong>Important:</strong> This is an estimate. It does not include every real-life factor like utilities, renovations, moving costs, unexpected repairs, or changes in tax law and mortgage terms.\n      </div>\n    </div>\n\n    <!-- \u2500\u2500 RIGHT: Output \u2500\u2500 -->\n    <div>\n\n      <!-- Metric cards -->\n      <div class=\"metrics\">\n        <div class=\"metric\">\n          <div class=\"k\">Monthly Payment</div>\n          <div class=\"v\" id=\"monthlyPayment\">$3,034</div>\n          <div class=\"hint\">Principal + interest only</div>\n        </div>\n        <div class=\"metric\">\n          <div class=\"k\">Basic Break-Even</div>\n          <div class=\"v bad\" id=\"breakEven\">&gt;30 yrs</div>\n          <div class=\"hint\">House-only math</div>\n        </div>\n        <div class=\"metric\">\n          <div class=\"k\">Advanced Break-Even</div>\n          <div class=\"v good\" id=\"breakEvenAdvanced\">13y 10m</div>\n          <div class=\"hint\">Includes rent saved &amp; opp. cost</div>\n        </div>\n        <div class=\"metric\">\n          <div class=\"k\">Advanced Net @ 5 Yrs</div>\n          <div class=\"v bad\" id=\"fiveYearNet\">\u2212$79,147</div>\n          <div class=\"hint\">Quick comparison benchmark</div>\n        </div>\n      </div>\n\n      <!-- Table -->\n      <div class=\"card table-card\">\n        <div class=\"table-head\">\n          <div>\n            <div class=\"card-title\">Year-by-year breakdown</div>\n            <div class=\"card-sub\">This table shows what happens if you sell after each year. Hover the <em>i</em> icon for the exact formula.</div>\n          </div>\n          <div class=\"legend-dots\">\n            <div class=\"legend-dot\"><span style=\"background:var(--col-cost)\"></span>Cost</div>\n            <div class=\"legend-dot\"><span style=\"background:var(--col-gain)\"></span>Gain</div>\n            <div class=\"legend-dot\"><span style=\"background:var(--col-adv)\"></span>Advanced</div>\n          </div>\n        </div>\n        <div class=\"guide-block\">\n          <h4>What each result column means</h4>\n          <div class=\"guide-grid\">\n            <div class=\"guide-item\"><strong>Year:</strong> The point when you sell, after owning for that many full years.</div>\n            <div class=\"guide-item\"><strong>Sale Price:</strong> The estimated future home value after appreciation.</div>\n            <div class=\"guide-item\"><strong>Loan Balance:</strong> The mortgage principal still left to pay when you sell.</div>\n            <div class=\"guide-item\"><strong>Selling Costs:</strong> Fees tied to selling the home.</div>\n            <div class=\"guide-item\"><strong>Interest Paid:</strong> Mortgage interest paid up to that point. Principal is not counted here.</div>\n            <div class=\"guide-item\"><strong>Taxes + Ins. + Maint. + HOA:</strong> The running total of the major ownership costs outside principal and interest.</div>\n            <div class=\"guide-item\"><strong>Cash Back:</strong> Roughly what you walk away with from the sale after selling costs and remaining loan balance are paid.</div>\n            <div class=\"guide-item\"><strong>Rent Saved:</strong> The rent you did not have to pay because you owned instead.</div>\n            <div class=\"guide-item\"><strong>Opp. Cost:</strong> The estimated growth your upfront cash could have had elsewhere.</div>\n            <div class=\"guide-item\"><strong>Tax Benefit:</strong> Estimated ownership-related tax savings, if any.</div>\n            <div class=\"guide-item\"><strong>Basic Net:</strong> The home-only result.</div>\n            <div class=\"guide-item\"><strong>Advanced Net:</strong> The more complete rent-vs-buy result.</div>\n          </div>\n        </div>\n        <div class=\"table-wrap\">\n          <table>\n            <thead>\n              <tr>\n                <th>Year<i class=\"info\" title=\"How long you owned before selling.\nYear 1 = after 12 months.\">i</i></th>\n                <th>Sale Price<i class=\"info\" title=\"Purchase Price \u00d7 (1 + appreciation%)^(months/12)\">i</i></th>\n                <th>Loan Balance<i class=\"info\" title=\"Remaining mortgage principal at time of sale (standard amortization).\">i</i></th>\n                <th class=\"col-group-cost\">Selling Costs<i class=\"info\" title=\"Sale Price \u00d7 Selling Cost %\">i</i></th>\n                <th class=\"col-group-cost\">Interest Paid<i class=\"info\" title=\"[v2] Cumulative interest only \u2014 principal excluded (already in Cash Back).\">i</i></th>\n                <th class=\"col-group-cost\">Taxes + Ins. + Maint. + HOA<i class=\"info\" title=\"(Tax + Insurance + Maintenance)/12 \u00d7 months + HOA \u00d7 months\">i</i></th>\n                <th class=\"col-group-gain\">Cash Back<i class=\"info\" title=\"Sale Price \u2212 Selling Costs \u2212 Loan Balance\">i</i></th>\n                <th class=\"col-group-adv\">Rent Saved<i class=\"info\" title=\"Cumulative rent avoided with annual rent growth.\">i</i></th>\n                <th class=\"col-group-cost\">Opp. Cost<i class=\"info\" title=\"Upfront Cash \u00d7 ((1 + rate/12)^months \u2212 1). Default 6% (S&amp;P avg).\">i</i></th>\n                <th class=\"col-group-adv\">Tax Benefit<i class=\"info\" title=\"Annual Tax Benefit / 12 \u00d7 months\">i</i></th>\n                <th>Basic Net<i class=\"info\" title=\"[v2] Cash Back \u2212 Down \u2212 Closing \u2212 Interest \u2212 Other Costs\">i</i></th>\n                <th>Advanced Net<i class=\"info\" title=\"Basic Net + Rent Saved + Tax Benefit \u2212 Opp. Cost\">i</i></th>\n              </tr>\n            </thead>\n            <tbody id=\"resultsBody\"><tr style=\"animation-delay: 20ms;\"><td><div class=\"year-cell\"><div class=\"year-dot\"></div>Yr 1</div></td><td class=\"col-neutral\">$618,000</td><td class=\"col-neutral\">$474,635</td><td class=\"col-cost\">$43,260</td><td class=\"col-cost\">$31,042</td><td class=\"col-cost\">$20,500</td><td class=\"col-gain\">$100,105</td><td class=\"col-adv\">$30,000</td><td class=\"col-cost\">$8,327</td><td class=\"col-adv\">$0</td><td class=\"net-negative\">\u2212$86,437</td><td class=\"net-negative\">\u2212$64,763</td></tr><tr style=\"animation-delay: 40ms;\"><td><div class=\"year-cell\"><div class=\"year-dot\"></div>Yr 2</div></td><td class=\"col-neutral\">$636,540</td><td class=\"col-neutral\">$468,911</td><td class=\"col-cost\">$44,558</td><td class=\"col-cost\">$61,725</td><td class=\"col-cost\">$41,000</td><td class=\"col-gain\">$123,072</td><td class=\"col-adv\">$60,900</td><td class=\"col-cost\">$17,167</td><td class=\"col-adv\">$0</td><td class=\"net-negative\">\u2212$114,653</td><td class=\"net-negative\">\u2212$70,920</td></tr><tr style=\"animation-delay: 60ms;\"><td><div class=\"year-cell\"><div class=\"year-dot\"></div>Yr 3</div></td><td class=\"col-neutral\">$655,636</td><td class=\"col-neutral\">$462,803</td><td class=\"col-cost\">$45,895</td><td class=\"col-cost\">$92,024</td><td class=\"col-cost\">$61,500</td><td class=\"col-gain\">$146,939</td><td class=\"col-adv\">$92,727</td><td class=\"col-cost\">$26,552</td><td class=\"col-adv\">$0</td><td cl 15</div></td><td class=\"col-neutral\">$934,780</td><td class=\"col-neutral\">$348,284</td><td class=\"col-cost\">$65,435</td><td class=\"col-cost\">$414,391</td><td class=\"col-cost\">$307,500</td><td class=\"col-gain\">$521,062</td><td class=\"col-adv\">$557,967</td><td class=\"col-cost\">$196,303</td><td class=\"col-adv\">$0</td><td class=\"net-negative\">\u2212$335,829</td><td class=\"net-positive\">+$25,836</td></tr></tbody>\n          </table>\n        </div>\n        <div class=\"legend\">\n          <strong>Disclaimer:</strong> Planning tool only. Does not include PMI, utilities, moving costs, renovation spend, HOA special assessments, seller repair concessions, or tax law edge cases. Consult a financial advisor before making purchase decisions.\n        </div>\n      </div>\n\n    </div>\n  </div>\n</div>\n\n<!-- \u2500\u2500 Tweaks Panel \u2500\u2500 -->\n<div id=\"tweaks-panel\" style=\"display: block;\">\n  <h3>Tweaks</h3>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Theme</div>\n    <div class=\"tweak-toggle\">\n      <span style=\"font-size:12px;color:var(--text-muted)\">Dark / Light</span>\n      <div class=\"toggle-btn on\" id=\"themeToggle\" onclick=\"toggleTheme()\"></div>\n    </div>\n  </div>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Accent Color</div>\n    <div class=\"tweak-swatches\" id=\"swatches\">\n      <div class=\"swatch active\" style=\"background:#3b82f6\" data-accent=\"#3b82f6\" data-accent2=\"#06b6d4\" onclick=\"setAccent(this)\"></div>\n      <div class=\"swatch\" style=\"background:#8b5cf6\" data-accent=\"#8b5cf6\" data-accent2=\"#ec4899\" onclick=\"setAccent(this)\"></div>\n      <div class=\"swatch\" style=\"background:#10b981\" data-accent=\"#10b981\" data-accent2=\"#06b6d4\" onclick=\"setAccent(this)\"></div>\n      <div class=\"swatch\" style=\"background:#f59e0b\" data-accent=\"#f59e0b\" data-accent2=\"#f97316\" onclick=\"setAccent(this)\"></div>\n      <div class=\"swatch\" style=\"background:#ef4444\" data-accent=\"#ef4444\" data-accent2=\"#f97316\" onclick=\"setAccent(this)\"></div>\n    </div>\n  </div>\n\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Table density</div>\n    <div class=\"tweak-toggle\">\n      <span style=\"font-size:12px;color:var(--text-muted)\">Compact / Normal</span>\n      <div class=\"toggle-btn on\" id=\"densityToggle\" onclick=\"toggleDensity()\"></div>\n    </div>\n  </div>\n</div>\n\n<script>\n/* \u2500\u2500 Tweaks \u2500\u2500 */\nwindow.addEventListener('message', function(e) {\n  if (e.data && e.data.type === '__activate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'block';\n  }\n  if (e.data && e.data.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'none';\n  }\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\nvar lightMode = false;\nvar compactMode = false;\n\nfunction toggleTheme() {\n  lightMode = !lightMode;\n  document.body.classList.toggle('light-theme', lightMode);\n  document.getElementById('themeToggle').classList.toggle('on', lightMode);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { lightMode: lightMode } }, '*');\n}\n\nfunction setAccent(el) {\n  document.querySelectorAll('.swatch').forEach(function(s) { s.classList.remove('active'); });\n  el.classList.add('active');\n  var a = el.dataset.accent;\n  var a2 = el.dataset.accent2;\n  document.documentElement.style.setProperty('--accent', a);\n  document.documentElement.style.setProperty('--accent2', a2);\n  // Derive glow\n  document.documentElement.style.setProperty('--accent-glow', hexToRgba(a, 0.35));\n  document.documentElement.style.setProperty('--accent-soft', hexToRgba(a, 0.12));\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: a, accent2: a2 } }, '*');\n}\n\nfunction hexToRgba(hex, alpha) {\n  var r = parseInt(hex.slice(1,3),16);\n  var g = parseInt(hex.slice(3,5),16);\n  var b = parseInt(hex.slice(5,7),16);\n  return 'rgba('+r+','+g+','+b+','+alpha+')';\n}\n\nfunction toggleDensity() {\n  compactMode = !compactMode;\n  document.getElementById('densityToggle').classList.toggle('on', !compactMode);\n  var pads = compactMode ? '6px 10px' : '11px 12px';\n  document.querySelectorAll('th, td').forEach(function(el) {\n    el.style.padding = pads;\n  });\n}\n\n/* \u2500\u2500\u2500 Core finance \u2500\u2500\u2500 */\n(function () {\n  function num(id) {\n    return parseFloat(document.getElementById(id).value || \"0\") || 0;\n  }\n  function money(n) {\n    return new Intl.NumberFormat(\"en-US\", { style:\"currency\", currency:\"USD\", maximumFractionDigits:0 }).format(n);\n  }\n  function moneySigned(n) {\n    return (n >= 0 ? \"+\" : \"\u2212\") + money(Math.abs(n));\n  }\n  function payment(principal, annualRate, years) {\n    var r = annualRate / 100 / 12;\n    var n = years * 12;\n    if (principal <= 0 || n <= 0) return 0;\n    if (r === 0) return principal / n;\n    return principal * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n)-1);\n  }\n  function loanBalance(principal, annualRate, years, monthsPaid) {\n    var r = annualRate / 100 / 12;\n    var n = years * 12;\n    if (monthsPaid <= 0) return principal;\n    if (monthsPaid >= n) return 0;\n    if (r === 0) return principal * (1 - monthsPaid/n);\n    var pmt = payment(principal, annualRate, years);\n    return principal * Math.pow(1+r,monthsPaid) - pmt * ((Math.pow(1+r,monthsPaid)-1)/r);\n  }\n  function cumulativeInterestPaid(months, principal, annualRate, years) {\n    if (months <= 0) return 0;\n    var pmt = payment(principal, annualRate, years);\n    var totalPaid = pmt * months;\n    var remaining = loanBalance(principal, annualRate, years, months);\n    var principalRepaid = Math.max(0, principal - remaining);\n    return Math.max(0, totalPaid - principalRepaid);\n  }\n  function cumulativeRentSaved(months, baseMonthlyRent, annualRentGrowth) {\n    var total = 0;\n    for (var m = 0; m < months; m++) {\n      var yearIndex = Math.floor(m / 12);\n      total += baseMonthlyRent * Math.pow(1 + annualRentGrowth/100, yearIndex);\n    }\n    return total;\n  }\n  function opportunityCost(upfrontCash, annualRate, months) {\n    if (upfrontCash <= 0 || annualRate <= 0 || months <= 0) return 0;\n    return upfrontCash * (Math.pow(1 + annualRate/100/12, months) - 1);\n  }\n  function compute(months) {\n    var purchasePrice       = num(\"purchasePrice\");\n    var downPayment         = num(\"downPayment\");\n    var interestRate        = num(\"interestRate\");\n    var loanTermYears       = num(\"loanTermYears\");\n    var initialClosingCosts = num(\"initialClosingCosts\");\n    var annualAppreciation  = num(\"annualAppreciation\");\n    var sellingCostPercent  = num(\"sellingCostPercent\");\n    var annualPropertyTax   = num(\"annualPropertyTax\");\n    var annualInsurance     = num(\"annualInsurance\");\n    var annualMaintenance   = num(\"annualMaintenance\");\n    var monthlyHOA          = num(\"monthlyHOA\");\n    var monthlyRentSaved    = num(\"monthlyRentSaved\");\n    var annualRentGrowth    = num(\"annualRentGrowth\");\n    var opportunityCostRate = num(\"opportunityCostRate\");\n    var annualTaxBenefit    = num(\"annualTaxBenefit\");\n\n    var loanAmount   = Math.max(0, purchasePrice - downPayment);\n    var salePrice    = purchasePrice * Math.pow(1 + annualAppreciation/100, months/12);\n    var remaining    = Math.max(0, loanBalance(loanAmount, interestRate, loanTermYears, months));\n    var sellingCosts = salePrice * (sellingCostPercent/100);\n    var cashBack     = salePrice - sellingCosts - remaining;\n    var interestPaid = cumulativeInterestPaid(months, loanAmount, interestRate, loanTermYears);\n    var otherCosts   = ((annualPropertyTax + annualInsurance + annualMaintenance)/12) * months + (monthlyHOA * months);\n    var basicNet     = cashBack - downPayment - initialClosingCosts - interestPaid - otherCosts;\n    var rentSaved    = cumulativeRentSaved(months, monthlyRentSaved, annualRentGrowth);\n    var oppCost      = opportunityCost(downPayment + initialClosingCosts, opportunityCostRate, months);\n    var taxBenefit   = (annualTaxBenefit/12) * months;\n    var advancedNet  = basicNet + rentSaved + taxBenefit - oppCost;\n    return {\n      monthlyPayment: payment(loanAmount, interestRate, loanTermYears),\n      salePrice, loanBalance: remaining, sellingCosts, interestPaid,\n      otherCosts, cashBack, rentSaved, oppCost, taxBenefit, basicNet, advancedNet\n    };\n  }\n  function breakEvenMonth(useAdvanced) {\n    for (var m = 1; m <= 360; m++) {\n      var c = compute(m);\n      if ((useAdvanced ? c.advancedNet : c.basicNet) >= 0) return m;\n    }\n    return null;\n  }\n  function formatBreakEven(months) {\n    if (months === null) return \">30 yrs\";\n    var y = Math.floor(months/12);\n    var mo = months % 12;\n    return y + \"y \" + mo + \"m\";\n  }\n  function setMetric(id, text, positive) {\n    var el = document.getElementById(id);\n    el.textContent = text;\n    el.className = \"v \" + (positive ? \"good\" : \"bad\");\n  }\n  function calculate() {\n    var maxYears = Math.max(1, Math.floor(num(\"maxYears\")));\n    var body = document.getElementById(\"resultsBody\");\n    body.innerHTML = \"\";\n    var beBasic    = breakEvenMonth(false);\n    var beAdvanced = breakEvenMonth(true);\n\n    for (var y = 1; y <= maxYears; y++) {\n      var x = compute(y * 12);\n      var tr = document.createElement(\"tr\");\n      var bnClass = x.basicNet    >= 0 ? \"net-positive\" : \"net-negative\";\n      var anClass = x.advancedNet >= 0 ? \"net-positive\" : \"net-negative\";\n      tr.style.animationDelay = (y * 20) + 'ms';\n      tr.innerHTML =\n        \"<td><div class='year-cell'><div class='year-dot'></div>Yr \" + y + \"</div></td>\" +\n        \"<td class='col-neutral'>\" + money(x.salePrice)    + \"</td>\" +\n        \"<td class='col-neutral'>\" + money(x.loanBalance)  + \"</td>\" +\n        \"<td class='col-cost'>\"   + money(x.sellingCosts)  + \"</td>\" +\n        \"<td class='col-cost'>\"   + money(x.interestPaid)  + \"</td>\" +\n        \"<td class='col-cost'>\"   + money(x.otherCosts)    + \"</td>\" +\n        \"<td class='col-gain'>\"   + money(x.cashBack)      + \"</td>\" +\n        \"<td class='col-adv'>\"    + money(x.rentSaved)     + \"</td>\" +\n        \"<td class='col-cost'>\"   + money(x.oppCost)       + \"</td>\" +\n        \"<td class='col-adv'>\"    + money(x.taxBenefit)    + \"</td>\" +\n        \"<td class='\" + bnClass + \"'>\" + moneySigned(x.basicNet)    + \"</td>\" +\n        \"<td class='\" + anClass + \"'>\" + moneySigned(x.advancedNet) + \"</td>\";\n      body.appendChild(tr);\n    }\n\n    var oneMonth = compute(1);\n    var fiveYrs  = compute(60);\n    var mpText   = money(oneMonth.monthlyPayment);\n    var beText   = formatBreakEven(beBasic);\n    var beaText  = formatBreakEven(beAdvanced);\n    var fiveText = moneySigned(fiveYrs.advancedNet);\n\n    document.getElementById(\"monthlyPayment\").textContent = mpText;\n    setMetric(\"breakEven\",         beText,  beBasic    !== null);\n    setMetric(\"breakEvenAdvanced\", beaText, beAdvanced !== null);\n    setMetric(\"fiveYearNet\",       fiveText, fiveYrs.advancedNet >= 0);\n\n    // Update hero bar\n    document.getElementById(\"heroMonthly\").textContent = mpText;\n    document.getElementById(\"heroBE1\").textContent     = beText;\n    document.getElementById(\"heroBE2\").textContent     = beaText;\n    document.getElementById(\"heroFive\").textContent    = fiveText;\n  }\n  function resetDefaults() {\n    var defaults = {\n      purchasePrice:120000, downPayment:120000, interestRate:6.5,\n      loanTermYears:30, initialClosingCosts:15000, annualAppreciation:3,\n      sellingCostPercent:7, annualPropertyTax:12000, annualInsurance:2500,\n      annualMaintenance:6000, monthlyHOA:0, maxYears:15,\n      monthlyRentSaved:2500, annualRentGrowth:3,\n      opportunityCostRate:6, annualTaxBenefit:0\n    };\n    // correct purchase price\n    defaults.purchasePrice = 600000;\n    Object.keys(defaults).forEach(function(k) {\n      document.getElementById(k).value = defaults[k];\n    });\n    calculate();\n  }\n  document.getElementById(\"calcBtn\").addEventListener(\"click\", calculate);\n  document.getElementById(\"resetBtn\").addEventListener(\"click\", resetDefaults);\n  document.querySelectorAll(\"input\").forEach(function(el) {\n    el.addEventListener(\"input\", calculate);\n    el.addEventListener(\"change\", calculate);\n  });\n  resetDefaults();\n})();\n<\/script>\n\n\n</body></html>"</script>
